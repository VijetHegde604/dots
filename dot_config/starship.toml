# Get the full Starship experience: https://starship.rs

add_newline = true
palette = "material_vijet"

# The main prompt format
format = """
[$username@$hostname]($style) ${custom.distrobox}\
[$directory](fg:dir)\
$nix_shell\
$python\
$nodejs\
$rust\
$golang\
$package\
$git_branch\
$git_status\
$cmd_duration
$character"""

# The right-aligned prompt
right_format = "$time$battery"

[palettes.material_vijet]
muted = "#78828c"
accent = "#b5d0ff"
accent_dim = "#8caac8"
danger = "#ff6b6b"
good = "#9ccc65"
dir = "#8caac8"
subtle = "#9aa5b1"

[username]
show_always = true
format = "[$user]($style)"
style_user = "fg:muted"

[hostname]
ssh_only = false
format = "[$hostname]($style)"
style = "fg:muted"

[directory]
truncation_length = 3
style = "fg:dir"
read_only = " ï€£"
format = "[$path]($style)[$read_only]($style)"

[nix_shell]
disabled = false
symbol = "ïŒ“ "
format = " [$symbol$state]($style)"
style = "fg:accent_dim"

[git_branch]
symbol = "î‚  "
format = " [$symbol$branch]($style)"
style = "fg:accent"

[git_status]
format = "([$all_status$ahead_behind]($style))"
style = "fg:accent"
ahead = " â†‘$count"
behind = " â†“$count"
diverged = " َ°¹¹ â†‘$ahead_countâ†“$behind_count"

[cmd_duration]
min_time = 500
format = " [âڈ± $duration]($style)"
style = "fg:accent_dim"

[python]
symbol = "îک† "
format = " [${symbol}${pyenv_prefix}(${version} )(\\($virtualenv\\))]($style)"
style = "fg:accent_dim"

[nodejs]
symbol = "îœک "
format = " [$symbol($version)]($style)"
style = "fg:accent_dim"

[rust]
symbol = "î‍¨ "
format = " [$symbol($version)]($style)"
style = "fg:accent_dim"

[golang]
symbol = "îک§ "
format = " [$symbol($version)]($style)"
style = "fg:accent_dim"

[battery]
full_symbol = "َ°پ¹ "
charging_symbol = "َ°‚„ "
discharging_symbol = "َ°‚ƒ "

[[battery.display]]
threshold = 20
style = "fg:danger"

[[battery.display]]
threshold = 100
style = "fg:subtle"

[time]
disabled = false
format = "[$time]($style)"
style = "fg:subtle"

[custom.distrobox]
description = "Displays name of the activated distrobox container"
symbol = "î¶• "
# Shell check for Distrobox
when = '[ -n "$CONTAINER_ID" ]'
command = 'echo "$CONTAINER_ID"'
format = " [$symbol$output]($style) "
style = "fg:accent"

